resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["Caliptra contributors"]

[workspace.dependencies]
aes-gcm = "0.10.3"
anyhow = "1.0.97"
arrayvec = { version = "0.7.4", default-features = false }
async-trait = "0.1.87"
base64 = "0.22"
bitfield = "0.14.0"
bitflags = { version = "2.4.0", default-features = false }
