ctrlc = "3.4.5"
elf = "0.7.4"
ecdsa = { version = "0.16.9", features = ["pem"]}
embassy-executor = "0.9.1"
embassy-sync = "0.6.2"
embedded-alloc = "0.5.1"
embedded-hal = "1.0"
fips204 = "0.4.6"
futures = "0.3.31"
gdbstub = "0.6.3"
gdbstub_arch = "0.2.4"
