hex = "0.4.3"
hkdf = "0.12.4"
hmac = "0.12.1"
int-enum = "1.2.0"
lazy_static = "1.4.0"
libc = "0.2"
log = "0.4.26"
nix = "0.26.2"
num_enum = "0.7.2"
num-derive = "0.4.2"
num-traits = "0.2"
openssl = { version = "0.10", features = ["vendored"] }
pkcs8 = "0.10.2"
portable-atomic = "1.7.0"
p384 = "0.13.0"
prettyplease = "0.2.37"
proc-macro2 = "1.0.66"
quote = "1.0"
rand = "0.8.5"
rayon = "1.10"
random-port = "0.1.1"
same-file = "1"
semver = "1.0.23"
sec1 = { version = "0.7.3" }
serde = { version = "1.0.209", default-features = false, features = ["alloc", "derive", "serde_derive"] }
serde_json = { version = "1.0.127", features = ["alloc"] }
serde-hjson = "1.1.0"
sha2 = { version = "0.10.8", default-features = false }
sha3 = { version = "0.10.8", default-features = false }
simple_logger = "5.0.0"
smlang = "0.8.0"
static_cell = "2.1.0"
subst = "0.3.8"
sudo = "0.6.0"
strum = "0.24"
