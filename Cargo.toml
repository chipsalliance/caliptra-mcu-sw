cbindgen = "0.24"
cc = "1.0"
cfg-if = "1.0.0"
chrono = { version = "0.4.38", features = ["serde"] }
clap = { version = "4.5.23", features = [
    "cargo",
    "derive",
    "env",
    "string",
    "unicode",
    "wrap_help",
] }
clap-num = "1.2.0"
constant_time_eq = { version = "0.4.2", default-features = false }
crc = "3.2.1"
crc32fast = "1.4.2"
critical-section = "1.1.2"
