caliptra-test-harness-types-2_1 = { git = "https://github.com/chipsalliance/caliptra-sw", rev = "49927b620f317ad4c459811f49baa56de197126c", package = "caliptra-test-harness-types", default-features = false }
ocp-eat-2_1 = { git = "https://github.com/chipsalliance/caliptra-sw", rev = "49927b620f317ad4c459811f49baa56de197126c", package = "ocp-eat", default-features = false }
ureg-2_1 = { git = "https://github.com/chipsalliance/caliptra-sw", rev = "49927b620f317ad4c459811f49baa56de197126c", package = "ureg", default-features = false }

# caliptra dependencies
caliptra-bitstream-downloader = { git = "https://github.com/chipsalliance/caliptra-sw", rev = "8bfab8d1fa6dda44c86300c6d9d2de6919482644" }
dpe = { git = "https://github.com/chipsalliance/caliptra-sw", rev = "8bfab8d1fa6dda44c86300c6d9d2de6919482644", default-features = false, features = ["dpe_profile_p384_sha384"] }

# tock dependencies; keep git revs in sync
capsules-core = { git = "https://github.com/tock/tock.git", rev = "release-2.2" }
capsules-extra = { git = "https://github.com/tock/tock.git", rev = "release-2.2" }
capsules-system = { git = "https://github.com/tock/tock.git", rev = "release-2.2" }
components = { git = "https://github.com/tock/tock.git", rev = "release-2.2" }
kernel = { git = "https://github.com/tock/tock.git", rev = "release-2.2" , features = ["debug_load_processes"] }
riscv = { git = "https://github.com/tock/tock.git", rev = "release-2.2" }
riscv-csr = { git = "https://github.com/tock/tock.git", rev = "release-2.2" }
rv32i = { git = "https://github.com/tock/tock.git", rev = "release-2.2" }
tock-registers = { git = "https://github.com/tock/tock.git", rev = "release-2.2" }

# local Tock dependencies; if you use these, you also need to use local caliptra-sw and change its tock-registers to point at the same tock location
# capsules-core = { path = "../tock/capsules/core" }
# capsules-extra = { path = "../tock/capsules/extra" }
# capsules-system = { path = "../tock/capsules/system" }
# components = { path = "../tock/boards/components" }
# kernel = { path = "../tock/kernel" }
# riscv = { path = "../tock/arch/riscv" }
# riscv-csr = { path = "../tock/libraries/riscv-csr" }
# rv32i = { path = "../tock/arch/rv32i" }
# tock-registers = { path = "../tock/libraries/tock-register-interface" }



# Always optimize the emulator during tests, as it is a major bottleneck for
# test speed.
[profile.test]
opt-level = 3
lto = "thin"

[profile.release]
debug = true      # Keep debug symbols in the release ELF so that we can debug more easily.
lto = true
opt-level = "z"
codegen-units = 1

[patch.crates-io]
openssl = { git = "https://github.com/clundin25/rust-openssl.git", rev = "4ada1c1d7c264e052e7bb71ecddbd196a5c2a0c7" } # MLDSA
