<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 540" font-family="Consolas, 'Courier New', monospace" font-size="14">
  <defs>
    <style>
      .step { fill: #fafafa; stroke: #555; stroke-width: 1.5; rx: 6; }
      .step-new { fill: #e8f5e9; stroke: #2e7d32; stroke-width: 1.5; rx: 6; }
      .trap { fill: #fff3e0; stroke: #e65100; stroke-width: 1.5; rx: 6; }
      .arrow { stroke: #888; stroke-width: 1.5; fill: none; marker-end: url(#ah); }
      .arrow-trap { stroke: #e65100; stroke-width: 1.5; fill: none; marker-end: url(#ah-r); }
      .title { font-weight: bold; font-size: 16px; fill: #333; }
      .label { font-size: 13px; fill: #333; }
      .label-sm { font-size: 12px; fill: #666; }
      .mono { font-family: Consolas, monospace; font-size: 12px; fill: #1565c0; }
    </style>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#888"/></marker>
    <marker id="ah-r" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#e65100"/></marker>
  </defs>
  <rect class="step" x="260" y="20" width="360" height="50"/>
  <text class="title" x="440" y="42" text-anchor="middle">Reset deasserts</text>
  <text class="mono" x="440" y="60" text-anchor="middle">PC = 0x9000_0000</text>
  <line class="arrow" x1="440" y1="70" x2="440" y2="100"/>
  <rect class="step-new" x="260" y="100" width="360" height="50"/>
  <text class="title" x="440" y="122" text-anchor="middle">start.s</text>
  <text class="label-sm" x="440" y="140" text-anchor="middle">sets sp, jumps to main()</text>
  <line class="arrow" x1="440" y1="150" x2="440" y2="180"/>
  <rect class="step-new" x="260" y="180" width="360" height="50"/>
  <text class="title" x="440" y="202" text-anchor="middle">tests::exception::run()</text>
  <text class="label-sm" x="440" y="220" text-anchor="middle">gated by feature = "test-exception"</text>
  <line class="arrow" x1="440" y1="230" x2="440" y2="260"/>
  <rect class="step-new" x="260" y="260" width="360" height="40"/>
  <text class="mono" x="440" y="284" text-anchor="middle">println!("NWP exception test: triggering...")</text>
  <line class="arrow" x1="440" y1="300" x2="440" y2="330"/>
  <rect class="trap" x="260" y="330" width="360" height="40"/>
  <text class="mono" x="440" y="354" text-anchor="middle">asm!("unimp")  — illegal instruction!</text>
  <line class="arrow-trap" x1="440" y1="370" x2="440" y2="400"/>
  <text class="label-sm" x="455" y="388">trap</text>
  <rect class="step-new" x="260" y="400" width="360" height="50"/>
  <text class="title" x="440" y="422" text-anchor="middle">exception_handler()</text>
  <text class="mono" x="440" y="440" text-anchor="middle">csrr mcause; csrr mepc</text>
  <line class="arrow" x1="440" y1="450" x2="440" y2="480"/>
  <rect class="step-new" x="260" y="480" width="360" height="40"/>
  <text class="mono" x="440" y="504" text-anchor="middle">print "Ec=&lt;8hex&gt;@&lt;8hex&gt;\r\n"; exit_emulator(0x01)</text>
</svg>
