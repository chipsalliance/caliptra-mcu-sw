<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" font-family="Consolas, 'Courier New', monospace" font-size="14">
  <defs>
    <style>
      .src { fill: #e8f5e9; stroke: #2e7d32; stroke-width: 2; rx: 6; }
      .consumer { fill: #fafafa; stroke: #555; stroke-width: 1.2; rx: 4; }
      .consumer-new { fill: #e8f5e9; stroke: #2e7d32; stroke-width: 1.5; rx: 4; }
      .arrow { stroke: #888; stroke-width: 1.5; fill: none; marker-end: url(#ah); }
      .arrow-new { stroke: #2e7d32; stroke-width: 1.5; fill: none; marker-end: url(#ah-g); }
      .title { font-weight: bold; font-size: 14px; fill: #333; }
      .label { font-size: 13px; fill: #333; }
      .label-sm { font-size: 12px; fill: #666; }
      .note { font-size: 13px; fill: #2e7d32; font-weight: bold; }
      .mono { font-family: Consolas, monospace; font-size: 12px; fill: #1565c0; }
    </style>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#888"/></marker>
    <marker id="ah-g" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#2e7d32"/></marker>
