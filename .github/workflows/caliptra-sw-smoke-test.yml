name: Caliptra SW Smoke Test

on:
  pull_request:
  workflow_dispatch:

jobs:
  caliptra-sw-mcu-rom-smoke-test:
    # The caliptra-sw caliptra-2.0 smoke workflow is not compatible with
    # spdm-lite integration branches. Skip it for PRs targeting spdm-lite,
    # matching the existing skip for spdm-lite-named source branches.
    if: ${{ github.base_ref != 'spdm-lite' && !startsWith(github.head_ref, 'spdm-lite') }}
    uses: chipsalliance/caliptra-sw/.github/workflows/fpga-subsystem.yml@caliptra-2.0
    with:
      mcu-commit: ${{ github.event.pull_request.head.sha || github.sha }}
      branch: caliptra-2.0
      fpga-itrng: true
      extra-features: itrng
