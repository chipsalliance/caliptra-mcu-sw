name: Nightly Workflows 

on:
  schedule:
    - cron: "0 0 * * *"
  # TODO Remove before merging - Triggers on PRs for testing
  pull_request: 
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
 ### End-to-End Attestation
  attestation_e2e:
    runs-on: ubuntu-24.04

    env:
      CARGO_INCREMENTAL: 0
      SCCACHE_VERSION: 0.8.2
      SCCACHE_GHA_CACHE_TO: sccache-caliptra-mcu-sw
      SCCACHE_GHA_CACHE_FROM: sccache-caliptra-mcu-sw

      # Change this to a new random value if you suspect the cache is corrupted
      SCCACHE_C_CUSTOM_CACHE_BUSTER: 8b42a6e70ec4

      # Vendor / Device identity (used across build, CoRIM, and verification)
      ATTESTATION_VENDOR: "ACME Corp"
      ATTESTATION_MODEL: "DeviceX"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install required packages
        run: |
          sudo apt-get update -qy && \
          sudo apt-get install -qy build-essential curl gcc-multilib gcc-riscv64-unknown-elf git rustup &&
          rustup toolchain install -c clippy,rust-src,llvm-tools,rustfmt,rustc-dev

      - name: Restore sccache binary
        uses: actions/cache/restore@v3
        id: sccache_bin_restore
        with:
          path: ~/.cargo/bin/sccache
          key: sccache-bin-${{ env.SCCACHE_VERSION }}-${{
            env.SCCACHE_C_CUSTOM_CACHE_BUSTER }}

      - name: Install sccache
        if: steps.sccache_bin_restore.outputs.cache-hit != 'true'
        run: |
          cargo install sccache --version ${SCCACHE_VERSION} --no-default-features --features=gha --locked

      - name: Save sccache binary
        uses: actions/cache/save@v3
        if: steps.sccache_bin_restore.outputs.cache-hit != 'true'
        with:
          path: ~/.cargo/bin/sccache
          key: ${{ steps.sccache_bin_restore.outputs.cache-primary-key }}

      - name: Configure sccache
        uses: actions/github-script@v6
        with:
          script: |
            core.exportVariable('RUSTC_WRAPPER', process.env.HOME + '/.cargo/bin/sccache');
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Install cocli
        run: |
          go install github.com/veraison/cocli@v1.0.0-alpha0
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      # ---- Attestation via spdm_requester_emu -------------------------------
      - name: Install cmake 3.x
        run: |
          wget https://github.com/Kitware/CMake/releases/download/v3.31.6/cmake-3.31.6-linux-x86_64.tar.gz &&
          mkdir -p /opt/cmake &&
          tar xvzf cmake-3.31.6-linux-x86_64.tar.gz -C /opt/cmake --strip-components=1 &&
          echo "/opt/cmake/bin" >> $GITHUB_PATH

      - name: Checkout spdm-emu repository
        uses: actions/checkout@v4
        with:
          repository: chipsalliance/caliptra-spdm-emu
          ref: caliptra-main
          path: spdm-emu
          submodules: recursive

      - name: Build spdm-emu
        run: |
          pushd spdm-emu
          git submodule update --init --recursive
          mkdir build
          pushd build
          cmake -DARCH=x64 -DTOOLCHAIN=GCC -DTARGET=Debug -DCRYPTO=openssl -DCMAKE_C_FLAGS="-DLIBSPDM_MAX_CERT_CHAIN_SIZE=0x2000" ..
          make copy_sample_key
          make
          popd
          popd

      # ---- Build firmware with test features enabled -------------------------------
      - name: Build firmware with test SPDM responder features
        run: |
          cargo xtask all-build --runtime-features test-mctp-spdm-attestation \
            --vendor "$ATTESTATION_VENDOR" --model "$ATTESTATION_MODEL"

      # ---- Generate reference CoRIM values -------------------------------
      - name: Generate reference-value CoRIM
        run: |
          cat > /tmp/corim-config.json << EOF
          {
            "vendor": "${ATTESTATION_VENDOR}",
            "model": "${ATTESTATION_MODEL}",
            "output_dir": "attestation-artifacts/refval-corim",
            "signing": {
              "test_key": "caliptra-corim-test-signing-key"
            }
          }
          EOF
          cargo xtask corim gen-refval --bundle target/all-fw.zip --config /tmp/corim-config.json

      # ---- Upload Reference CoRIM artifacts -------------------------------
      - name: Upload Reference CoRIM artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: attestation-artifacts
          path: |
            attestation-artifacts/

      # ---- Run SPDM attestation test on MCTP transport -------------------------------
      - name: Generate SPDM nonce
        run: |
          echo "SPDM_NONCE=$(openssl rand -hex 32)" >> $GITHUB_ENV

      - name: Run SPDM attestation test on MCTP transport
        env:
          SPDM_VALIDATOR_DIR: ${{ github.workspace }}/spdm-emu/build/bin
          CPTRA_FIRMWARE_BUNDLE: ${{ github.workspace }}/target/all-fw.zip
        run: |
          cargo t -p caliptra-mcu-tests-integration -- --include-ignored --nocapture --exact test_mctp_spdm_attestation::test::test_mctp_spdm_attestation

      - name: Upload attestation logs
        if: always()
        uses: actions/upload-artifact@v4
        env:
          SPDM_VALIDATOR_DIR: ${{ github.workspace }}/spdm-emu/build/bin
        with:
          name: spdm-mctp-attestation-test-results
          path: |
            ${{ env.SPDM_VALIDATOR_DIR }}/spdm_requester_emu_output.txt
            ${{ env.SPDM_VALIDATOR_DIR }}/caliptra-evidence.pcap
            ${{ env.SPDM_VALIDATOR_DIR }}/measurement_block_fd.bin
            ${{ env.SPDM_VALIDATOR_DIR }}/certificate_chain_slot_00.der

      - name: Display SPDM attestation test results
        env:
          SPDM_VALIDATOR_DIR: ${{ github.workspace }}/spdm-emu/build/bin
        run: |
          cat $SPDM_VALIDATOR_DIR/spdm_requester_emu_output.txt

      # ---- Authenticate attestation inputs against Trust Anchor Store -------------------------------
      - name: Prepare Attestation Artifacts and Build Trust Anchor Store
        env:
          SPDM_VALIDATOR_DIR: ${{ github.workspace }}/spdm-emu/build/bin
          CORIM_DIR: ${{ github.workspace }}/attestation-artifacts/refval-corim
          SIGNED_CORIM_DIR: ${{ github.workspace }}/attestation-artifacts/signed-refval-corim
        run: |
          # Copy evidence artifacts
          EVIDENCE_DIR="attestation-artifacts/evidence"
          mkdir -p "$EVIDENCE_DIR"
          cp $SPDM_VALIDATOR_DIR/measurement_block_fd.bin "$EVIDENCE_DIR/"
          cp $SPDM_VALIDATOR_DIR/certificate_chain_slot_00.der "$EVIDENCE_DIR/"
          echo "Copied evidence artifacts:"
          ls -la "$EVIDENCE_DIR"

          # Copy only the signed CoRIM files into a dedicated directory.
          mkdir -p "$SIGNED_CORIM_DIR"
          cp "$CORIM_DIR"/signed-*.cbor "$SIGNED_CORIM_DIR/"
          echo "Copied signed Reference CoRIM artifacts:"
          ls -la "$SIGNED_CORIM_DIR" | sort

          # Build Trust Anchor Store
          TA_STORE_DIR="attestation-artifacts/ta_store"
          mkdir -p "$TA_STORE_DIR/roots" "$TA_STORE_DIR/endorsement-certs"

          # Copy the test root CA cert which endorsed the device ID cert into roots/
          cp ocp-eat-verifier/ocptoken/test-data/ta-store/roots/slot0_ecc_test_root_ca.der \
            "$TA_STORE_DIR/roots/slot0_ecc_test_root_ca.der"

          # Copy the CoRIM signing certificate into roots/ and endorsement-certs/
          cp "$CORIM_DIR/fake_keys/signing-cert.der" "$TA_STORE_DIR/roots/corim_signing_cert.der"
          cp "$CORIM_DIR/fake_keys/signing-cert.der" "$TA_STORE_DIR/endorsement-certs/corim_signing_cert.der"

          echo "Trust Anchor Store contents:"
          find "$TA_STORE_DIR" -type f | sort

      # ---- Authenticate, verify, and display EAT claims -------------------------------
      - name: Authenticate and verify attestation inputs
        working-directory: ocp-eat-verifier
        env:
          EVIDENCE_DIR: ${{ github.workspace }}/attestation-artifacts/evidence
          TA_STORE_PATH: ${{ github.workspace }}/attestation-artifacts/ta_store
          SIGNED_REFVAL_CORIM_PATH: ${{ github.workspace }}/attestation-artifacts/signed-refval-corim
        run: |
          cargo build --release -p ocptoken
          ./target/release/ocptoken authenticate --show-claims \
            -e $EVIDENCE_DIR/measurement_block_fd.bin \
            -c $EVIDENCE_DIR/certificate_chain_slot_00.der

      # ---- Appraise evidence against reference values (OCP EAT Verifier Algorithm) -------------------------------
      # TODO: Re-enable once ocptoken supports spdm-lib EAT format
      # - name: Appraise evidence against reference values
      #   working-directory: ocp-eat-verifier
      #   env:
      #     EVIDENCE_DIR: ${{ github.workspace }}/attestation-artifacts/evidence
      #     TA_STORE_PATH: ${{ github.workspace }}/attestation-artifacts/ta_store
      #     SIGNED_REFVAL_CORIM_PATH: ${{ github.workspace }}/attestation-artifacts/signed-refval-corim
      #   run: |
      #     ./target/release/ocptoken appraise \
      #       -e $EVIDENCE_DIR/measurement_block_fd.bin \
      #       -c $EVIDENCE_DIR/certificate_chain_slot_00.der

 ### Caliptra Util Host Validator Tests

  precheckin:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      CARGO_INCREMENTAL: 0
      EXTRA_CARGO_CONFIG: 'target.''cfg(all())''.rustflags = ["-Dwarnings"]'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Test commit name
        run: |
          echo "Lint: release_ref=$(git rev-parse HEAD)"

      - name: Install required packages
        run: |
          sudo apt-get update -qy && \
          sudo apt-get install -qy build-essential cmake clang libclang-dev openssl libssl-dev libudev-dev libpci-dev pkg-config curl git && \
          rustup toolchain install -c clippy,rust-src,llvm-tools,rustfmt,rustc-dev

      - name: Fetch cargo git dependencies
        run: |
          pushd caliptra-util-host
          cargo fetch
          popd

      - name: Build libspdm from SPDM-Utils
        run: |
          SPDM_UTILS_DIR=$(cargo metadata --manifest-path caliptra-util-host/Cargo.toml --format-version=1 | \
            python3 -c 'import json, os, sys; data = json.load(sys.stdin); print(os.path.dirname(next(p["manifest_path"] for p in data["packages"] if p["name"] == "SPDM-Utils")))')
          BUILD_DIR="${GITHUB_WORKSPACE}/caliptra-util-host/target/libspdm-build"
          export LIBSPDM_LIB_DIR="${GITHUB_WORKSPACE}/caliptra-util-host/target/libspdm-lib"
          OPENSSL_LIB_DIR=$(pkg-config --variable=libdir openssl)
          cmake -S "${SPDM_UTILS_DIR}/third-party/libspdm" -B "${BUILD_DIR}" \
            -DARCH=x64 \
            -DTOOLCHAIN=GCC \
            -DTARGET=Debug \
            -DCRYPTO=openssl \
            -DENABLE_BINARY_BUILD=1 \
            -DSTACK_USAGE=ON \
            -DCOMPILED_LIBCRYPTO_PATH="${OPENSSL_LIB_DIR}" \
            -DCOMPILED_LIBSSL_PATH="${OPENSSL_LIB_DIR}" \
            -DDISABLE_TESTS=1 \
            -DCMAKE_C_FLAGS="-DLIBSPDM_MAX_CERT_CHAIN_SIZE=0x2000 \
              -DLIBSPDM_ENABLE_CAPABILITY_EVENT_CAP=0 \
              -DLIBSPDM_ENABLE_CAPABILITY_MEL_CAP=0 \
              -DLIBSPDM_HAL_PASS_SPDM_CONTEXT=1 \
              -DLIBSPDM_ENABLE_CAPABILITY_GET_KEY_PAIR_INFO_CAP=0 \
              -DLIBSPDM_ENABLE_CAPABILITY_SET_KEY_PAIR_INFO_CAP=0"
          cmake --build "${BUILD_DIR}" --parallel "$(nproc)"
          mkdir -p "${LIBSPDM_LIB_DIR}"
          find "${BUILD_DIR}/lib" -name "*.a" -exec cp {} "${LIBSPDM_LIB_DIR}/" \;
          echo "LIBSPDM_LIB_DIR=${LIBSPDM_LIB_DIR}" >> $GITHUB_ENV

      - name: Run caliptra-util-host precheckin
        run: |
          pushd caliptra-util-host
          cargo xtask precheckin
          popd

  caliptra_util_host_validator_tests:
    runs-on: ubuntu-24.04
    needs: [precheckin]

    env:
      CARGO_INCREMENTAL: 0
      SCCACHE_VERSION: 0.8.2
      SCCACHE_GHA_CACHE_TO: sccache-caliptra-mcu-sw
      SCCACHE_GHA_CACHE_FROM: sccache-caliptra-mcu-sw
      # CPTRA_COVERAGE_PATH: /tmp

      # Change this to a new random value if you suspect the cache is corrupted
      SCCACHE_C_CUSTOM_CACHE_BUSTER: 8b42a6e70ec4

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Test commit name
        run: |
          echo "Build-Test: release_ref=$(git rev-parse HEAD)"

      - name: Install required packages
        run: |
          sudo apt-get update -qy && \
          sudo apt-get install -qy build-essential cmake clang libclang-dev openssl libssl-dev libudev-dev libpci-dev pkg-config curl gcc-multilib gcc-riscv64-unknown-elf git rustup &&
          rustup toolchain install -c clippy,rust-src,llvm-tools,rustfmt,rustc-dev

      - name: Fetch cargo git dependencies
        run: |
          pushd caliptra-util-host
          cargo fetch
          popd

      - name: Build libspdm from SPDM-Utils
        run: |
          SPDM_UTILS_DIR=$(cargo metadata --manifest-path caliptra-util-host/Cargo.toml --format-version=1 | \
            python3 -c 'import json, os, sys; data = json.load(sys.stdin); print(os.path.dirname(next(p["manifest_path"] for p in data["packages"] if p["name"] == "SPDM-Utils")))')
          BUILD_DIR="${GITHUB_WORKSPACE}/caliptra-util-host/target/libspdm-build"
          export LIBSPDM_LIB_DIR="${GITHUB_WORKSPACE}/caliptra-util-host/target/libspdm-lib"
          OPENSSL_LIB_DIR=$(pkg-config --variable=libdir openssl)
          cmake -S "${SPDM_UTILS_DIR}/third-party/libspdm" -B "${BUILD_DIR}" \
            -DARCH=x64 \
            -DTOOLCHAIN=GCC \
            -DTARGET=Debug \
            -DCRYPTO=openssl \
            -DENABLE_BINARY_BUILD=1 \
            -DSTACK_USAGE=ON \
            -DCOMPILED_LIBCRYPTO_PATH="${OPENSSL_LIB_DIR}" \
            -DCOMPILED_LIBSSL_PATH="${OPENSSL_LIB_DIR}" \
            -DDISABLE_TESTS=1 \
            -DCMAKE_C_FLAGS="-DLIBSPDM_MAX_CERT_CHAIN_SIZE=0x2000 \
              -DLIBSPDM_ENABLE_CAPABILITY_EVENT_CAP=0 \
              -DLIBSPDM_ENABLE_CAPABILITY_MEL_CAP=0 \
              -DLIBSPDM_HAL_PASS_SPDM_CONTEXT=1 \
              -DLIBSPDM_ENABLE_CAPABILITY_GET_KEY_PAIR_INFO_CAP=0 \
              -DLIBSPDM_ENABLE_CAPABILITY_SET_KEY_PAIR_INFO_CAP=0"
          cmake --build "${BUILD_DIR}" --parallel "$(nproc)"
          mkdir -p "${LIBSPDM_LIB_DIR}"
          find "${BUILD_DIR}/lib" -name "*.a" -exec cp {} "${LIBSPDM_LIB_DIR}/" \;
          echo "LIBSPDM_LIB_DIR=${LIBSPDM_LIB_DIR}" >> $GITHUB_ENV

      - name: Restore sccache binary
        uses: actions/cache/restore@v3
        id: sccache_bin_restore
        with:
          path: ~/.cargo/bin/sccache
          key: sccache-bin-${{ env.SCCACHE_VERSION }}-${{ env.SCCACHE_C_CUSTOM_CACHE_BUSTER }}

      - name: Install sccache
        if: steps.sccache_bin_restore.outputs.cache-hit != 'true'
        run: |
          cargo install sccache --version ${SCCACHE_VERSION} --no-default-features --features=gha --locked

      # Save the sccache binary immediately so we can reuse it in future runs
      # even if the rest of the current run fails.
      - name: Save sccache binary
        uses: actions/cache/save@v3
        if: steps.sccache_bin_restore.outputs.cache-hit != 'true'
        with:
          path: ~/.cargo/bin/sccache
          key: ${{ steps.sccache_bin_restore.outputs.cache-primary-key }}

      - name: Configure sccache
        uses: actions/github-script@v6
        with:
          script: |
            core.exportVariable('RUSTC_WRAPPER', process.env.HOME + '/.cargo/bin/sccache');
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Build caliptra-util-host
        run: |
          pushd caliptra-util-host
          cargo xtask build
          popd
          echo "SPDM_VALIDATOR_BIN=${GITHUB_WORKSPACE}/target/caliptra-util-host/debug/caliptra-spdm-validator" >> $GITHUB_ENV
          echo "OCP_DEV_IDENTITY_PROVISION_TOOL_BIN=${GITHUB_WORKSPACE}/target/caliptra-util-host/debug/ocp_dev_identity_provision_tool" >> $GITHUB_ENV

      - name: Run Caliptra Util Host tests
        run: |
          pushd caliptra-util-host
          cargo xtask test
          popd

      - name: Run Caliptra Util Host validator tests
        run: |
          cargo xtask all-build
          cargo test --package caliptra-mcu-tests-integration --lib -- test::test_caliptra_util_host_validator --nocapture --include-ignored
          sccache --show-stats

      - name: Run Caliptra Util Host MCTP VDM validator tests
        run: |
          cargo test --package caliptra-mcu-tests-integration --lib -- test_mctp_vdm_validator::test::test_caliptra_util_host_mctp_vdm_validator --nocapture --include-ignored
          sccache --show-stats

      - name: Run Caliptra Util Host SPDM VDM validator tests (production mode)
        run: |
          cargo test --package caliptra-mcu-tests-integration --lib -- test_caliptra_util_host_spdm_vdm_validator::test::test_caliptra_util_host_spdm_vdm_validator --exact --nocapture --include-ignored
          sccache --show-stats

      - name: Run Caliptra Util Host SPDM VDM validator tests (manufacturing mode)
        run: |
          cargo test --package caliptra-mcu-tests-integration --lib -- test_caliptra_util_host_spdm_vdm_validator::test::test_caliptra_util_host_spdm_vdm_validator_mfg_mode --exact --nocapture --include-ignored
          sccache --show-stats

      - name: Run OCP Device Identity provisioning test
        env:
          CPTRA_FIRMWARE_BUNDLE: ${{ github.workspace }}/target/all-fw.zip
        run: |
          cargo xtask all-build --separate-runtimes --runtime-features test-mctp-spdm-set-certificate
          cargo test --package caliptra-mcu-tests-integration --lib -- test_ocp_dev_identity_provision_tool::test::test_mctp_spdm_set_certificate_with_ocp_provision_tool --exact --nocapture --include-ignored
          sccache --show-stats

      - name: Upload test results and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: caliptra-util-host-validator-test-results
          path: |
            target/*/debug/*.log
            target/*/debug/*.txt
            target/*/debug/*.pcap


 #### SPDM Validator Tests

  spdm_validator_tests:
    runs-on: ubuntu-24.04

    env:
      CARGO_INCREMENTAL: 0
      SCCACHE_VERSION: 0.8.2
      SCCACHE_GHA_CACHE_TO: sccache-caliptra-mcu-sw
      SCCACHE_GHA_CACHE_FROM: sccache-caliptra-mcu-sw
      # CPTRA_COVERAGE_PATH: /tmp

      # Change this to a new random value if you suspect the cache is corrupted
      SCCACHE_C_CUSTOM_CACHE_BUSTER: 8b42a6e70ec4

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Test commit name
        run: |
          echo "Build-Test: release_ref=$(git rev-parse HEAD)"

      - name: Install required packages
        run: |
          sudo apt-get update -qy && \
          sudo apt-get install -qy build-essential curl gcc-multilib gcc-riscv64-unknown-elf git rustup &&
          rustup toolchain install -c clippy,rust-src,llvm-tools,rustfmt,rustc-dev

      - name: Install cmake 3.x
        run: |
          wget https://github.com/Kitware/CMake/releases/download/v3.31.6/cmake-3.31.6-linux-x86_64.tar.gz &&
          mkdir -p /opt/cmake &&
          tar xvzf cmake-3.31.6-linux-x86_64.tar.gz -C /opt/cmake --strip-components=1 &&
          echo "/opt/cmake/bin" >> $GITHUB_PATH

      - name: Restore sccache binary
        uses: actions/cache/restore@v3
        id: sccache_bin_restore
        with:
          path: ~/.cargo/bin/sccache
          key: sccache-bin-${{ env.SCCACHE_VERSION }}-${{
            env.SCCACHE_C_CUSTOM_CACHE_BUSTER }}

      - name: Install sccache
        if: steps.sccache_bin_restore.outputs.cache-hit != 'true'
        run: |
          cargo install sccache --version ${SCCACHE_VERSION} --no-default-features --features=gha --locked

      # Save the sccache binary immediately so we can reuse it in future runs
      # even if the rest of the current run fails.
      - name: Save sccache binary
        uses: actions/cache/save@v3
        if: steps.sccache_bin_restore.outputs.cache-hit != 'true'
        with:
          path: ~/.cargo/bin/sccache
          key: ${{ steps.sccache_bin_restore.outputs.cache-primary-key }}

      - name: Configure sccache
        uses: actions/github-script@v6
        with:
          script: |
            core.exportVariable('RUSTC_WRAPPER', process.env.HOME + '/.cargo/bin/sccache');
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Checkout spdm-emu repository
        uses: actions/checkout@v4
        with:
          repository: chipsalliance/caliptra-spdm-emu
          ref: caliptra-main
          path: spdm-emu
          submodules: recursive

      - name: Build spdm-emu
        run: |
          pushd spdm-emu
          git submodule update --init --recursive
          mkdir build
          pushd build
          cmake -DARCH=x64 -DTOOLCHAIN=GCC -DTARGET=Debug -DCRYPTO=openssl -DCMAKE_C_FLAGS="-DLIBSPDM_MAX_CERT_CHAIN_SIZE=0x2000" ..
          make copy_sample_key
          make
          popd
          popd

      - name: Generate SPDM nonce
        run: |
          echo "SPDM_NONCE=$(openssl rand -hex 32)" >> $GITHUB_ENV

      - name: Run SPDM validator tests on MCTP transport
        env:
          SPDM_VALIDATOR_DIR: ${{ github.workspace }}/spdm-emu/build/bin
        run: |
          echo "SPDM_NONCE in MCTP stage: ${SPDM_NONCE}"
          echo "SPDM_NONCE length: ${#SPDM_NONCE}"
          cargo xtask all-build
          cargo t -p caliptra-mcu-tests-integration -- --test test_mctp_spdm_responder_conformance --nocapture  --include-ignored
          sccache --show-stats

      - name: Upload logs and traces for MCTP transport
        if: always()
        uses: actions/upload-artifact@v4
        env:
          SPDM_VALIDATOR_DIR: ${{ github.workspace }}/spdm-emu/build/bin
        with:
          name: spdm-mctp-validator-test-results
          path: |
            ${{ env.SPDM_VALIDATOR_DIR }}/test.log
            ${{ env.SPDM_VALIDATOR_DIR }}/caliptra_spdm_validator.pcap
            ${{ env.SPDM_VALIDATOR_DIR }}/spdm_device_validator_output.txt

      - name: Display SPDM Validator test results on MCTP transport
        env:
          SPDM_VALIDATOR_DIR: ${{ github.workspace }}/spdm-emu/build/bin
        run: |
          cat $SPDM_VALIDATOR_DIR/test.log

      - name: Check for test failures on MCTP transport
        env:
          SPDM_VALIDATOR_DIR: ${{ github.workspace }}/spdm-emu/build/bin
        run: |
          if grep -E 'test suite \(.*\) - pass: [0-9]+, fail: [1-9][0-9]*' $SPDM_VALIDATOR_DIR/test.log; then
            echo "Test suite had failures."
            exit 1
          fi

      - name: Run SPDM attestation test on MCTP transport (PCR Quote measurements)
        env:
          SPDM_VALIDATOR_DIR: ${{ github.workspace }}/spdm-emu/build/bin
        run: |
          cargo xtask all-build
          cargo t -p caliptra-mcu-tests-integration -- --test test_mctp_spdm_attestation_pcr_quote --nocapture --include-ignored

      - name: Run SPDM validator tests on DOE transport
        env:
          SPDM_VALIDATOR_DIR: ${{ github.workspace }}/spdm-emu/build/bin
        run: |
          cargo xtask all-build
          cargo t -p caliptra-mcu-tests-integration -- --test test_doe_spdm_responder_conformance --nocapture  --include-ignored
          sccache --show-stats

      - name: Upload logs and traces for DOE transport
        if: always()
        uses: actions/upload-artifact@v4
        env:
          SPDM_VALIDATOR_DIR: ${{ github.workspace }}/spdm-emu/build/bin
        with:
          name: spdm-doe-validator-test-results
          path: |
            ${{ env.SPDM_VALIDATOR_DIR }}/test.log
            ${{ env.SPDM_VALIDATOR_DIR }}/caliptra_spdm_validator.pcap
            ${{ env.SPDM_VALIDATOR_DIR }}/spdm_device_validator_output.txt

      - name: Display SPDM Validator test results for DOE transport
        env:
          SPDM_VALIDATOR_DIR: ${{ github.workspace }}/spdm-emu/build/bin
        run: |
          cat $SPDM_VALIDATOR_DIR/test.log

      - name: Check for test failures on DOE transport
        env:
          SPDM_VALIDATOR_DIR: ${{ github.workspace }}/spdm-emu/build/bin
        run: |
          if grep -E 'test suite \(.*\) - pass: [0-9]+, fail: [1-9][0-9]*' $SPDM_VALIDATOR_DIR/test.log; then
            echo "Test suite had failures."
            exit 1
          fi

      - name: Checkout CCC spdm-rs repository
        uses: actions/checkout@v4
        with:
          repository: chipsalliance/caliptra-spdm-rs
          ref: caliptra-0.5.2
          path: spdm-rs
          submodules: recursive

      - name: Prepare, build spdm-rs, and copy test keys
        working-directory: spdm-rs
        run: |
          git submodule update --init --recursive
          sh_script/pre-build.sh
          cargo build --no-default-features --features="spdm-ring,hashed-transcript-data,async-executor,chunk-cap"
          cp -r test_key target/debug/
          ls -l target/debug/test_key/ecp384/

      - name: Copy caliptra root CA cert into spdm-rs test_key
        run: |
          cp ${{ github.workspace }}/ocp-eat-verifier/ocptoken/test-data/ta-store/roots/slot0_ecc_test_root_ca.der \
             ${{ github.workspace }}/spdm-rs/target/debug/test_key/ecp384/ca.cert.der

      - name: Run CCC spdm-requester-emu tests for TDISP+IDE
        env:
          SPDM_VALIDATOR_DIR: ${{ github.workspace }}/spdm-rs/target/debug
        run: |
          cargo xtask all-build
          cargo t -p caliptra-mcu-tests-integration -- --test test_doe_spdm_tdisp_ide_validator --nocapture --include-ignored
          sccache --show-stats

      - name: Display CCC spdm-requester-emu test results for TDISP+IDE
        env:
          SPDM_VALIDATOR_DIR: ${{ github.workspace }}/spdm-rs/target/debug
        run: |
          cat $SPDM_VALIDATOR_DIR/tdisp_ide_validator_output.txt

      - name: Upload CCC spdm-requester-emu test results for TDISP+IDE
        if: always()
        uses: actions/upload-artifact@v4
        env:
          SPDM_VALIDATOR_DIR: ${{ github.workspace }}/spdm-rs/target/debug
        with:
          name: spdm-tdisp-ide-validator-test-results
          path: |
            ${{ env.SPDM_VALIDATOR_DIR }}/tdisp_ide_validator_output.txt

