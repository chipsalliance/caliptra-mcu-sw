[profile.nightly]
failure-output = "immediate-final"
fail-fast = false
slow-timeout = { period = "5m", terminate-after = 6 }

[profile.nightly.junit]
path = "/tmp/junit.xml"
store-success-output = false
store-failure-output = true

[profile.nightly-emulator]
store-success-output = false
failure-output = "immediate-final"
fail-fast = false
slow-timeout = { period = "60s", terminate-after = 30 }
# TODO: Failing tests tracked in https://github.com/chipsalliance/caliptra-mcu-sw/issues/1335.
default-filter = """
all()
"""

[profile.nightly-emulator.junit]
path = "/tmp/junit.xml"
store-success-output = false
store-failure-output = true

[profile.nightly-ci]
inherits = "nightly"
# Tests that program OTP with LifecycleControllerState::Dev as the initial
# state hang the FPGA at "Taking subsystem out of reset" (confirmed locally
# with test_lc_dev_to_prod). Dev-init tests are disabled until that's
# root-caused.
default-filter = """
(package(caliptra-mcu-hw-model)
    - test(model_emulated::test::test_new_unbooted)) |
(package(caliptra-mcu-tests-integration) and test(test_firmware_update_streaming_fpga))
"""
# Disabled because they hang the FPGA at boot (LifecycleControllerState::Dev):
#   test_sw_digest_lock,
#   test_otp_blank_check, test_otp_scramble_check, test_bootfsm_timeout,
#   and the Dev-starting subtests of test_lc_ctrl listed above.
# Disabled because they fail on FPGA:
#   test_fw_manifest_dot_hitless_lock, test_log_flash_usermode,
#   test_mctp_capsule_loopback, test_mcu_mbox_cmds,
#   test_mcu_mbox_fips_periodic, test_mcu_mbox_fips_self_test.
# Disabled pre-existing for flakiness:
#   test_firmware_update_streaming_fpga
#   test_rom_hooks_fire_in_order — SIGABRTs from a caliptra-sw hw-model
#     I3C SETDASA timeout (host cfg_initialize() times out, then a
#     poisoned-lock cascade in Drop) when run after the lifecycle tests;
#     tracked upstream. Still runs on the emulator profile.

[profile.nightly-release]
inherits = "nightly-emulator"
default-filter = """
(package(caliptra-mcu-tests-integration) and test(test_flash_soc_boot_successful))
"""

[profile.nightly-ci-spdm]
inherits = "nightly"
default-filter = """
(package(caliptra-mcu-tests-integration) and test(test_mctp_spdm_attestation)) |
(package(caliptra-mcu-tests-integration) and test(test_mctp_spdm_responder_conformance))
"""
